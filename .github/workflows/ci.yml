name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install pytest

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run tests
        run: pytest tests/ -v

      - name: Run consistency check
        run: python3 whitebox-pentest/scripts/check_consistency.py

      - name: Validate doctor output
        run: python3 whitebox-pentest/scripts/doctor.py --json

      - name: Validate prompt eval definitions
        run: python3 whitebox-pentest/scripts/validate_evals.py

      - name: Validate Kuzushi module import
        run: node -e "import('./kuzushi-module.js').then(() => console.log('import ok'))"

      - name: Validate package contents
        run: npm --cache /tmp/vuln-scout-npm-cache pack --dry-run

      - name: Smoke-test report renderers
        run: |
          python3 whitebox-pentest/scripts/report.py tests/fixtures/artifacts/sample-findings.json --format sarif -o /tmp/vuln-scout-report.sarif
          python3 whitebox-pentest/scripts/report.py tests/fixtures/artifacts/sample-findings.json --format md -o /tmp/vuln-scout-report.md
          python3 whitebox-pentest/scripts/report.py tests/fixtures/artifacts/sample-findings.json --format html -o /tmp/vuln-scout-report.html
